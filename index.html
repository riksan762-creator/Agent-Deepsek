<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Riksan AI — Premium AI Platform powered by DeepSeek" />
  <title>Riksan AI</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Marked.js for Markdown -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- highlight.js for syntax highlighting -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <!-- DOMPurify -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.6/purify.min.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ═══════════════════════════════════════ SIDEBAR ═══════════════════════════════════════ -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="logo">
      <div class="logo-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="logo-text">Riksan AI</span>
    </div>
    <button class="btn-icon sidebar-close" id="sidebarClose" aria-label="Close sidebar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
  </div>

  <button class="btn-new-chat" id="newChatBtn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
    New Chat
  </button>

  <div class="sidebar-section-label">Recent Chats</div>
  <div class="chat-history" id="chatHistory">
    <!-- dynamically populated -->
  </div>

  <div class="sidebar-footer">
    <button class="btn-theme-toggle" id="themeToggle" aria-label="Toggle theme">
      <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <span class="theme-label">Light Mode</span>
    </button>
    <div class="sidebar-version">v2.0 · DeepSeek-3.2</div>
  </div>
</aside>

<!-- Overlay for mobile -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- ═══════════════════════════════════════ MAIN ═══════════════════════════════════════ -->
<main class="main" id="main">

  <!-- Top Bar -->
  <header class="topbar">
    <button class="btn-icon" id="sidebarToggle" aria-label="Toggle sidebar">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
    </button>
    <div class="topbar-title" id="topbarTitle">Riksan AI</div>
    <div class="topbar-actions">
      <button class="btn-icon" id="clearChatBtn" title="Clear conversation">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
      </button>
    </div>
  </header>

  <!-- Chat Container -->
  <div class="chat-container" id="chatContainer">

    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
      <div class="welcome-glow"></div>
      <div class="welcome-content">
        <div class="welcome-logo">
          <div class="welcome-logo-ring"></div>
          <div class="welcome-logo-icon">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none">
              <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>
        <h1 class="welcome-title">Riksan AI</h1>
        <p class="welcome-subtitle">Your premium intelligent assistant. Ask anything — code, analysis, writing, and more.</p>

        <div class="suggestion-grid">
          <button class="suggestion-card" data-prompt="Write a Python function to scrape website data and save it to a CSV file">
            <div class="suggestion-icon">⚡</div>
            <div class="suggestion-text">
              <strong>Code Generation</strong>
              <span>Write a web scraper in Python</span>
            </div>
          </button>
          <button class="suggestion-card" data-prompt="Analyze the current market trends for AI SaaS startups in Southeast Asia and provide strategic recommendations">
            <div class="suggestion-icon">📊</div>
            <div class="suggestion-text">
              <strong>Market Analysis</strong>
              <span>AI SaaS trends in Southeast Asia</span>
            </div>
          </button>
          <button class="suggestion-card" data-prompt="Review this JavaScript code for bugs and security issues:\n\nconst getUserData = async (id) => {\n  const res = await fetch('/api/user?id=' + id);\n  return res.json();\n}">
            <div class="suggestion-icon">🔍</div>
            <div class="suggestion-text">
              <strong>Code Review</strong>
              <span>Review JS code for vulnerabilities</span>
            </div>
          </button>
          <button class="suggestion-card" data-prompt="Create a detailed content strategy and social media plan for a digital product startup targeting Indonesian millennials">
            <div class="suggestion-icon">✍️</div>
            <div class="suggestion-text">
              <strong>Content Strategy</strong>
              <span>Social media plan for startups</span>
            </div>
          </button>
        </div>
      </div>
    </div>

    <!-- Messages -->
    <div class="messages" id="messages"></div>

  </div>

  <!-- Input Area -->
  <div class="input-area">
    <div class="input-wrapper">
      <div class="input-box" id="inputBox">
        <textarea
          id="messageInput"
          placeholder="Ask Riksan AI anything..."
          rows="1"
          maxlength="32000"
          aria-label="Message input"
        ></textarea>
        <div class="input-actions">
          <span class="char-count" id="charCount"></span>
          <button class="btn-send" id="sendBtn" aria-label="Send message">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
          <button class="btn-stop hidden" id="stopBtn" aria-label="Stop generation">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
          </button>
        </div>
      </div>
      <div class="input-footer">
        <span>Riksan AI · DeepSeek-3.2</span>
        <span>Press <kbd>Enter</kbd> to send · <kbd>Shift+Enter</kbd> for new line</span>
      </div>
    </div>
  </div>

</main>

<!-- ═══════════════════════════════════════ TOAST ═══════════════════════════════════════ -->
<div class="toast-container" id="toastContainer"></div>

<script src="api.js"></script>
<script src="script.js"></script>
</body>
</html>
